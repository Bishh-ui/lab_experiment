<!DOCTYPE html>
<html>
<head>
<title>Scientific Calculator</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.calculator{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    width:320px;
}

#display{
    width:100%;
    height:60px;
    font-size:26px;
    margin-bottom:15px;
    text-align:right;
    border:none;
    padding:10px;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
}

button{
    padding:15px;
    font-size:16px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.op{background:#f59e0b;color:white;}
.equal{background:#22c55e;color:white;}
.clear{background:#ef4444;color:white;}
</style>
</head>

<body>

<div class="calculator">
<input type="text" id="display">

<div class="buttons">
<button onclick="clearDisplay()" class="clear">C</button>
<button onclick="append('sin(')">sin</button>
<button onclick="append('cos(')">cos</button>
<button onclick="append('tan(')">tan</button>
<button onclick="append('Math.sqrt(')">√</button>

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button onclick="append('/')">/</button>
<button onclick="append('Math.pow(')">x²</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button onclick="append('*')">*</button>
<button onclick="append('Math.log(')">log</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button onclick="append('-')">-</button>
<button onclick="append('Math.PI')">π</button>

<button onclick="append('0')">0</button>
<button onclick="append('.')">.</button>
<button onclick="calculate()" class="equal">=</button>
<button onclick="append('+')">+</button>
<button onclick="append(')')">)</button>
</div>
</div>

<script>
let display = document.getElementById("display");

function append(val){
    display.value += val;
}

function clearDisplay(){
    display.value="";
}

function calculate(){
    try{
        display.value = eval(display.value);
    }catch{
        display.value="Error";
    }
}
</script>

</body>
</html>
