<h2>Event Handling Demo</h2>


<button onclick="showMessage()">Click Me</button>
<p id="msg"></p>

<br>


<h3 onmouseover="hoverText(this)" onmouseout="normalText(this)">
    Move your mouse over this text
</h3>

<br>


<input type="text" id="nameBox" placeholder="Type your name"
       onkeyup="typingEvent()">
<p id="typing"></p>

<hr>

<p>Thank you for visiting here !!!!!!</p>


<script>
function showMessage(){
    document.getElementById("msg").innerHTML =
    "Welcome to my Personal Website!";
}

function hoverText(x){
    x.style.color = "red";
}

function normalText(x){
    x.style.color = "black";
}

function typingEvent(){
    var name = document.getElementById("nameBox").value;
    document.getElementById("typing").innerHTML =
    "You are typing: " + name;
}
</script>
