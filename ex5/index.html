<!DOCTYPE html>
<html>
<head>
    <title>Calculator Project</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    
   <div class="intro">
    <h1>(Bishal Jha)</h1>
    <div class="tag">Experiment no.5</div>

    <a href="calculator.html" class="open-btn">
        Open Simple Calculator
    </a>
</div>
    
    <div class="calculator">
        <input type="text" id="display" value="0" disabled>

        <div class="buttons">
            <button onclick="clearDisplay()" class="green">AC</button>
            <button onclick="deleteLast()" class="green">DE</button>
            <button onclick="append('%')" class="green">%</button>
            <button onclick="append('/')" class="green">/</button>

            <button onclick="append('7')">7</button>
            <button onclick="append('8')">8</button>
            <button onclick="append('9')">9</button>
            <button onclick="append('*')" class="green">*</button>

            <button onclick="append('4')">4</button>
            <button onclick="append('5')">5</button>
            <button onclick="append('6')">6</button>
            <button onclick="append('-')" class="green">-</button>

            <button onclick="append('1')">1</button>
            <button onclick="append('2')">2</button>
            <button onclick="append('3')">3</button>
            <button onclick="append('+')" class="green">+</button>

            <button onclick="append('00')">00</button>
            <button onclick="append('0')">0</button>
            <button onclick="append('.')">.</button>
            <button onclick="calculate()" class="equal">=</button>
        </div>
    </div>

</div>


<script>
let display = document.getElementById("display");

function append(value){
    if(display.value == "0") display.value = "";
    display.value += value;
}

function clearDisplay(){
    display.value = "0";
}

function deleteLast(){
    display.value = display.value.slice(0,-1);
    if(display.value == "") display.value = "0";
}

function calculate(){
    try{
        display.value = eval(display.value);
    }catch{
        display.value = "Error";
    }
}
</script>

</body>
</html>
